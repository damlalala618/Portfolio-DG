<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG Logo Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #ffffff;
            overflow: hidden;
        }
        .logo-container { width: 400px; height: 400px; }
        svg { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg id="logo" viewBox="0 0 500 500">
            <defs>
                <!-- Left-to-right gradient: lighter teal on left, darker on right -->
                <linearGradient id="gradient" x1="93" y1="0" x2="405" y2="0" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#1a9fa2" />
                    <stop offset="100%" stop-color="#08586a" />
                </linearGradient>
            </defs>

            <!--
                D shape as a thick stroke with a GAP on the left side.
                The path traces the centerline of the D from the bottom of the gap,
                clockwise around the letter, ending at the top of the gap.
                The gap (empty space) is the opening between start and end.
            -->
            <path
                id="d-path"
                d="M 128 280
                   L 128 405
                   C 128 445, 155 462, 220 462
                   C 340 462, 370 385, 370 252
                   C 370 118, 340 42, 220 42
                   C 155 42, 128 59, 128 98
                   L 128 205"
                stroke="url(#gradient)"
                stroke-width="70"
                stroke-linecap="butt"
                fill="none"
            />

            <!-- Snake head dot -->
            <circle id="head-dot" r="0" fill="#15878a" />
        </svg>
    </div>

    <script src="dgg.js"></script>
</body>
</html>
